<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- 3x3 patch grid favicon for efficient-SID -->
  <!-- Each patch is a slightly different shade to suggest diversity -->
  <rect width="64" height="64" rx="8" fill="#1e293b"/>
  
  <!-- Row 1 -->
  <rect x="6" y="6" width="15" height="15" rx="2" fill="#60a5fa"/>
  <rect x="24" y="6" width="15" height="15" rx="2" fill="#3b82f6"/>
  <rect x="42" y="6" width="15" height="15" rx="2" fill="#93c5fd"/>
  
  <!-- Row 2 -->
  <rect x="6" y="24" width="15" height="15" rx="2" fill="#2563eb"/>
  <rect x="24" y="24" width="15" height="15" rx="2" fill="#bfdbfe"/>
  <rect x="42" y="24" width="15" height="15" rx="2" fill="#60a5fa"/>
  
  <!-- Row 3 -->
  <rect x="6" y="42" width="15" height="15" rx="2" fill="#93c5fd"/>
  <rect x="24" y="42" width="15" height="15" rx="2" fill="#60a5fa"/>
  <rect x="42" y="42" width="15" height="15" rx="2" fill="#2563eb"/>
</svg>
